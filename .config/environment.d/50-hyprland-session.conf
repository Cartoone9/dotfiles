# Session-wide env for systemd user units and D-Bus-activated apps.
# Mirrors what Hyprland sets in ~/.config/hypr/lua/env.lua for the apps it
# launches itself — keep the two in sync.
QT_QPA_PLATFORMTHEME=qt6ct
QT_STYLE_OVERRIDE=kvantum
XCURSOR_THEME=Bibata-Modern-Ice
XCURSOR_SIZE=24
SSH_AUTH_SOCK=${XDG_RUNTIME_DIR}/keyring/ssh
ELECTRON_OZONE_PLATFORM_HINT=auto
